---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:

    - name: Get the original user before privilege escalation
      command: whoami
      become: false
      register: original_user
      changed_when: false

    - name: Set fact for the original user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ original_user.stdout }}"

    - name: Install apt packages
      ansible.builtin.apt:
        name:
          - git
          - neovim
          - flatpak
          - make
          - unzip
          - gcc
          - ripgrep
          - xclip
          - fonts-noto-color-emoji
          - golang-go
          - wget
          - tar
          - fontconfig
          - jq
        state: present

