---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  tasks:
    - name: Get my user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Install DNF packages
      ansible.builtin.dnf:
        name:
          - git
          - htop
          - vim
          - firefox
          - gcc
          - tmux
          - make
          - flatpak
          - alacritty
          - syncthing
          - keepassxc
        state: present

    - name: Install DNF plugins core
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
    
